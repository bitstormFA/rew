name: build-pjrt-plugins

on:
  workflow_dispatch:
    inputs:
      xla_rev:
        description: 'openxla/xla commit to build from'
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write

env:
  BAZEL_VERSION: "7.7.0"

jobs:
  build:
    name: ${{ matrix.slot }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - slot: x86_64-darwin-cpu
            runner: macos-13
            target: cpu
            bazel_config: ""
          - slot: aarch64-linux-gnu-cuda12
            runner: ubuntu-latest
            target: cuda12
            bazel_config: "--config=cuda --repo_env=HERMETIC_CUDA_VERSION=\"12.9.1\" --repo_env=HERMETIC_CUDNN_VERSION=\"9.8.0\""
          - slot: aarch64-linux-gnu-cuda13
            runner: ubuntu-latest
            target: cuda13
            bazel_config: "--config=cuda --repo_env=HERMETIC_CUDA_VERSION=\"13.0.0\" --repo_env=HERMETIC_CUDNN_VERSION=\"9.12.0\""
          - slot: x86_64-linux-gnu-tpu
            runner: ubuntu-latest
            target: tpu
            bazel_config: ""

    steps:
      - uses: actions/checkout@v4

      - name: Determine XLA revision
        id: xla_rev
        run: |
          if [ -n "${{ inputs.xla_rev }}" ]; then
            echo "rev=${{ inputs.xla_rev }}" >> "$GITHUB_OUTPUT"
          else
            echo "rev=$(jq -r .openxla_xla_rev pjrt_manifest.json)" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout openxla/xla
        uses: actions/checkout@v4
        with:
          repository: openxla/xla
          ref: ${{ steps.xla_rev.outputs.rev }}
          path: xla-src

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-version: "1.x"

      - name: Build plugin
        working-directory: xla-src
        run: |
          case "${{ matrix.target }}" in
            cpu)  LABEL="//xla/pjrt/c:pjrt_c_api_cpu_plugin.so" ;;
            cuda12|cuda13) LABEL="//xla/pjrt/c:pjrt_c_api_gpu_plugin.so" ;;
            tpu)  LABEL="//xla/pjrt/c:pjrt_c_api_tpu_plugin.so" ;;
          esac
          bazel build -c opt ${{ matrix.bazel_config }} "$LABEL"

      - name: Package artifact
        run: |
          case "${{ matrix.target }}" in
            cpu)  BIN="xla-src/bazel-bin/xla/pjrt/c/pjrt_c_api_cpu_plugin.so"
                  MEMBER="pjrt_c_api_cpu_plugin.so" ;;
            cuda12|cuda13) BIN="xla-src/bazel-bin/xla/pjrt/c/pjrt_c_api_gpu_plugin.so"
                  MEMBER="pjrt_c_api_${{ matrix.target }}_plugin.so" ;;
            tpu)  BIN="xla-src/bazel-bin/xla/pjrt/c/pjrt_c_api_tpu_plugin.so"
                  MEMBER="pjrt_c_api_tpu_plugin.so" ;;
          esac
          ARCHIVE="pjrt_c_api_${{ matrix.target }}_plugin-${{ matrix.slot }}.tar.gz"
          cp "$BIN" "$MEMBER"
          tar czf "$ARCHIVE" "$MEMBER"
          sha256sum "$ARCHIVE" | awk '{print $1}' > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "SHA256=$(cat "$ARCHIVE.sha256")" >> "$GITHUB_ENV"

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

      - name: Upload build artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.slot }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  update-manifest:
    name: Update manifest checksums
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download SHA-256 files
        uses: actions/download-artifact@v4
        with:
          path: checksums/

      - name: Update manifest
        run: |
          for dir in checksums/*/; do
            slot=$(basename "$dir")
            sha_file=$(find "$dir" -name "*.sha256" | head -1)
            if [ -n "$sha_file" ]; then
              sha=$(cat "$sha_file")
              echo "  $slot: $sha"
              jq --arg slot "$slot" --arg sha "$sha" \
                '.slots[$slot].sha256 = $sha' \
                pjrt_manifest.json > tmp.json && mv tmp.json pjrt_manifest.json
            fi
          done

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore: update pjrt_manifest.json checksums for ${{ github.event.release.tag_name }}"
          body: "Auto-generated by the build-pjrt-plugins workflow after release ${{ github.event.release.tag_name }}."
          branch: update-manifest-${{ github.event.release.tag_name }}
          commit-message: "chore: update pjrt_manifest.json checksums"
